name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binaries
        run: |
          mkdir -p bin
          GOOS=linux GOARCH=amd64 go build -o bin/cronin-linux-amd64 main.go
          GOOS=linux GOARCH=arm64 go build -o bin/cronin-linux-arm64 main.go
          GOOS=darwin GOARCH=amd64 go build -o bin/cronin-darwin-amd64 main.go
          GOOS=darwin GOARCH=arm64 go build -o bin/cronin-darwin-arm64 main.go
          GOOS=windows GOARCH=amd64 go build -o bin/cronin-windows-amd64.exe main.go

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            bin/cronin-linux-amd64
            bin/cronin-linux-arm64
            bin/cronin-darwin-amd64
            bin/cronin-darwin-arm64
            bin/cronin-windows-amd64.exe
